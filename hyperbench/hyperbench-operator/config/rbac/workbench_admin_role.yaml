# This rule is not used by the project hyperbench-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over portal.hyperbench.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: hyperbench-operator
    app.kubernetes.io/managed-by: kustomize
  name: workbench-admin-role
rules:
- apiGroups:
  - portal.hyperbench.com
  resources:
  - workbenches
  verbs:
  - '*'
- apiGroups:
  - portal.hyperbench.com
  resources:
  - workbenches/status
  verbs:
  - get
