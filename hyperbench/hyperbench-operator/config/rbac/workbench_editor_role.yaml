# This rule is not used by the project hyperbench-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the portal.hyperbench.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: hyperbench-operator
    app.kubernetes.io/managed-by: kustomize
  name: workbench-editor-role
rules:
- apiGroups:
  - portal.hyperbench.com
  resources:
  - workbenches
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - portal.hyperbench.com
  resources:
  - workbenches/status
  verbs:
  - get
