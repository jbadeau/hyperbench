apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyperbench-operator
  labels:
    {{- include "hyperbench-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: hyperbench-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hyperbench-operator
    spec:
      serviceAccountName: hyperbench-operator
      containers:
        - name: manager
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          args:
            - --leader-elect
          ports:
            - containerPort: 8081
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
