apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  labels:
    {{- include "hyperbench-dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboard
    spec:
      serviceAccountName: dashboard
      containers:
        - name: dashboard
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.port }}
          env:
            - name: PORT
              value: "{{ .Values.port }}"
            - name: WORKBENCH_NAMESPACE
              value: {{ .Values.workbenchNamespace }}
            - name: WORKBENCH_NAME
              value: {{ .Values.workbenchName }}
