spring:
  application:
    name: hyperbench
  datasource:
    url: jdbc:h2:mem:hyperbench
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  data:
    rest:
      base-path: /api
      default-media-type: application/prs.hal-forms+json
  thymeleaf:
    cache: false
