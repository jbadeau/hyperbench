[tools]
java = "21"
maven = "3.9"
node = "22"
go = "1.24"
kind = "latest"
kubectl = "latest"
helm = "latest"
tilt = "latest"
operator-sdk = "latest"
kubebuilder = "latest"

# ── Build ────────────────────────────────────────────────────────────

[tasks.build]
description = "Build everything"
run = """
npm install
npm run build --workspace=hyperbench/hyperbench-shared
npm run build --workspace=hyperbench/hyperbench-dashboard
npm run build --workspace=todos/todos
npm run build --workspace=clients/clients
npm run build --workspace=onboarding/onboarding
mvn clean package
"""

[tasks.test]
description = "Run all tests"
run = "mvn test"

# ── Tilt ─────────────────────────────────────────────────────────────

[tasks."tilt:up"]
description = "Start Tilt dev loop (builds, deploys, watches)"
run = "tilt up"

[tasks."tilt:down"]
description = "Stop Tilt and tear down deployed resources"
run = "tilt down"

# ── Kubernetes ───────────────────────────────────────────────────────

[tasks."k8s:up"]
description = "Create kind cluster"
run = "kind create cluster --name hyperbench"

[tasks."k8s:down"]
description = "Delete kind cluster"
run = "kind delete cluster --name hyperbench"

[tasks."k8s:status"]
description = "Show pods and CRs"
run = """
kubectl get pods -A | grep -E 'hyperbench-operator|todos|clients|onboarding|dashboard|workbench'
echo ""
kubectl get workbenches,widgets,actions,navigationnodes,serviceproxies -A 2>/dev/null || echo "CRDs not yet available"
"""

[tasks."k8s:dashboard"]
description = "Port-forward dashboard to localhost:3000"
run = "kubectl port-forward -n dashboard svc/dashboard 3000:3000"
