# ── Home group ──
apiVersion: portal.hyperbench.com/v1alpha1
kind: NavigationNode
metadata:
  name: home-group
  labels:
    {{- include "hyperbench-workbench.labels" . | nindent 4 }}
spec:
  type: "group"
  title: "Home"
  ordinal: 0
---
apiVersion: portal.hyperbench.com/v1alpha1
kind: NavigationNode
metadata:
  name: dashboard-page
  labels:
    {{- include "hyperbench-workbench.labels" . | nindent 4 }}
spec:
  type: "page"
  title: "Dashboard"
  icon: "layout-dashboard"
  ordinal: 10
  parent: "home-group"
  page:
    description: "Overview dashboard with KPI metrics"
    path: "/dashboard"
    layout:
      type: "grid"
      columns: "1fr"
      rows: "auto"
      gap: "1rem"
      slots:
        - name: "kpi-cards"
          widgetRef: "dashboard-kpi-cards"
        - name: "chart"
          widgetRef: "dashboard-chart"
        - name: "data-table"
          widgetRef: "dashboard-data-table"
---
apiVersion: portal.hyperbench.com/v1alpha1
kind: NavigationNode
metadata:
  name: clients-page
  labels:
    {{- include "hyperbench-workbench.labels" . | nindent 4 }}
spec:
  type: "page"
  title: "Clients"
  icon: "users"
  ordinal: 15
  parent: "home-group"
  page:
    description: "Client management dashboard"
    path: "/clients"
    layout:
      type: "grid"
      columns: "1fr"
      rows: "auto"
      gap: "1rem"
      slots:
        - name: "table"
          widgetRef: "clients-table"
---
