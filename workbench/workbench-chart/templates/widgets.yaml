apiVersion: portal.hyperbench.com/v1alpha1
kind: Widget
metadata:
  name: clients-favorites
  labels:
    {{- include "hyperbench-workbench.labels" . | nindent 4 }}
spec:
  type: "server"
  title: "Favorite Clients"
  description: "Displays a list of favorite clients"
  context:
    subscribes:
      - key: "selectedClientId"
        required: false
    publishes:
      - key: "selectedClientId"
  server:
    endpoint: "/clients/favorites"
    swap: "innerHTML"
    trigger: "load, workbench:context from:body"
  actionRefs:
    - id: "select"
      actionRef: "select-client"
---
apiVersion: portal.hyperbench.com/v1alpha1
kind: Widget
metadata:
  name: clients-table
  labels:
    {{- include "hyperbench-workbench.labels" . | nindent 4 }}
spec:
  type: "server"
  title: "Clients Table"
  description: "Full-width table of all clients"
  server:
    endpoint: "/clients/table"
    swap: "innerHTML"
    trigger: "load"
---
apiVersion: portal.hyperbench.com/v1alpha1
kind: Widget
metadata:
  name: client-search
  labels:
    {{- include "hyperbench-workbench.labels" . | nindent 4 }}
spec:
  type: "server"
  title: "Client Search"
  description: "Header search widget for finding clients"
  context:
    publishes:
      - key: "selectedClientId"
  server:
    endpoint: "/clients/search"
    swap: "innerHTML"
    trigger: "load"
---
apiVersion: portal.hyperbench.com/v1alpha1
kind: Widget
metadata:
  name: client-context
  labels:
    {{- include "hyperbench-workbench.labels" . | nindent 4 }}
spec:
  type: "server"
  title: "Client Context"
  description: "Context bar widget showing selected client details"
  context:
    subscribes:
      - key: "selectedClientId"
        required: true
  server:
    endpoint: "/clients/context"
    swap: "innerHTML"
    trigger: "load, workbench:context from:body"
---
apiVersion: portal.hyperbench.com/v1alpha1
kind: Widget
metadata:
  name: client-details
  labels:
    {{- include "hyperbench-workbench.labels" . | nindent 4 }}
spec:
  type: "server"
  title: "Client Details"
  description: "Shows detailed information about the selected client"
  context:
    subscribes:
      - key: "selectedClientId"
        required: true
  server:
    endpoint: "/clients/details"
    swap: "innerHTML"
    trigger: "load, workbench:context from:body"
