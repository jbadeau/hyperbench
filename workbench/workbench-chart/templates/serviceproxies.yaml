apiVersion: portal.hyperbench.com/v1alpha1
kind: ServiceProxy
metadata:
  name: clients-service
  labels:
    {{- include "hyperbench-workbench.labels" . | nindent 4 }}
spec:
  displayName: "Clients Service"
  frontend:
    baseUrl: {{ .Values.services.clients.frontendUrl | quote }}
  api:
    baseUrl: {{ .Values.services.clients.apiUrl | quote }}
  proxy:
    - pathPrefix: "/clients"
      target: "frontend"
    - pathPrefix: "/api/clients"
      target: "api"
  healthCheck:
    path: "/actuator/health"
    target: "api"
---
