apiVersion: portal.hyperbench.com/v1alpha1
kind: Workbench
metadata:
  name: workbench-sample
  labels:
    {{- include "hyperbench-workbench.labels" . | nindent 4 }}
spec:
  title: {{ .Values.workbench.title | quote }}
  port: {{ .Values.workbench.port }}
  defaultPage: {{ .Values.workbench.defaultPage | quote }}
  branding:
    logo: "/assets/logo.svg"
    favicon: "/assets/favicon.ico"
  header:
    search:
      enabled: true
      widgetRef: "client-search"
    notifications:
      enabled: true
    settings:
      enabled: false
    userMenu:
      enabled: true
      label: "shadcn"
      email: "m@example.com"
  contextBar:
    enabled: true
    widgetRef: "client-context"
