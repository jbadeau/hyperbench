server:
  port: 8083

spring:
  application:
    name: hyperbench-clients
  datasource:
    url: jdbc:h2:mem:clients
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console
  data:
    rest:
      base-path: /api
      default-media-type: application/prs.hal-forms+json
